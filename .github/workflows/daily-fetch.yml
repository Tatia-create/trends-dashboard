name: Daily Trends Update

on:
  schedule:
    # 每天 UTC 02:30 = 北京 10:30 (沙箱定时任务跑完后的兜底)
    - cron: '30 2 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fetch
        run: |
          python3 scripts/fetch_trends.py
          STATS=$(python3 -c "import json; d=json.load(open('trends-data.json')); s=d.get('stats',{}); print(f\"total={s.get('total',0)} hot={s.get('hot',0)} trend={s.get('trend',0)} new={d.get('new_today',0)}\")")
          echo "📊 Stats: $STATS"

      - name: Commit + Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "🤖 github-actions auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "✅ Pushed"
          else
            echo "⏭ No changes"
          fi
