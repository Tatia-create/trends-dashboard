<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>全球趋势仪表盘 · Global Trends Dashboard · v3 信息密集蓝绿版</title>
<style>
  /* =========================================================
     v2 blue-green info-dense visual system
     Light gray-blue background, cyan/teal accent, one-glance
     heat classification via colored left bar.
     ========================================================= */
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface-2: #f1f5f9;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #1e293b;
    --text-dim: #64748b;
    --text-mute: #94a3b8;
    --primary: #0891b2;          /* cyan-600 */
    --primary-mid: #06b6d4;      /* cyan-500 */
    --primary-soft: #cffafe;     /* cyan-100 */
    --primary-faint: #ecfeff;    /* cyan-50 */

    --hot-bg: #fef2f2;
    --hot-bar: #dc2626;          /* red-600  */
    --hot-text: #b91c1c;

    --trend-bg: #fff7ed;
    --trend-bar: #ea580c;        /* orange-600 */
    --trend-text: #c2410c;

    --new-bg: #fefce8;
    --new-bar: #ca8a04;          /* yellow-600 */
    --new-text: #a16207;

    --arch-bg: #f8fafc;
    --arch-bar: #94a3b8;         /* slate-400 */
    --arch-text: #475569;

    --shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    --shadow-hover: 0 4px 12px rgba(15, 23, 42, 0.10);

    /* v2 经典 4 大类配色 (Cat → 装饰条色) */
    --cat-beauty: #ea580c;   /* orange-600 美妆护肤 */
    --cat-ai:     #1d4ed8;   /* blue-700   AI 与科技 */
    --cat-biz:    #16a34a;   /* green-600  商业与投融资 */
    --cat-ec:     #dc2626;   /* red-600    电商与 DTC */
    --cat-rsrch:  #7c3aed;   /* violet-600 研报与智库 */
    --cat-other:  #64748b;   /* slate-500  其他/未分类 */
    /* v2 顶部 header 配色 */
    --header-bg: #0f2c4d;    /* 藏青 navy */
    --header-line: #16a34a;  /* 底部绿边 */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
    color: var(--text);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body { padding: 14px; min-height: 100vh; }

  /* ===== Header (sticky) — v2 藏青+绿边 ===== */
  .header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--header-bg);
    color: #fff;
    border-radius: 10px;
    margin: -14px -14px 14px;
    padding: 16px 20px 14px;
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.12);
    border-bottom: 3px solid var(--header-line);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header h1 {
    font-size: 19px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.1px;
  }
  .header h1 { color: #fff; }
  .header h1 .en { color: #e2e8f0; font-weight: 600; }
  .header-sub { color: #cbd5e1; }
  .header-meta { color: #cbd5e1; }
  .live-dot { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.25); }
  .header-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 3px;
  }
  .header-meta {
    font-size: 11px;
    color: var(--text-mute);
    background: var(--surface-2);
    padding: 4px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .live-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: var(--primary-mid);
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* ===== Stats bar ===== */
  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 0 10px;
    font-size: 12px;
  }
  .stats-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    background: var(--surface-2);
    border-radius: 10px;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .stats-item b { color: #fff; font-weight: 700; }
  .stats-item.hot   { background: #dc2626; border-color: #dc2626; color: #fff; }
  .stats-item.trend { background: #ea580c; border-color: #ea580c; color: #fff; }
  .stats-item.new   { background: #facc15; border-color: #facc15; color: #1f2937; }
  .stats-item.new b { color: #1f2937; }
  .stats-item.arch  { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.30); color: #fff; }
  .stats-item.visible { background: #16a34a; border-color: #16a34a; color: #fff; }
  .stats-item.total { background: transparent; border: 1px solid #7dd3fc; color: #fff; }

  /* ===== Filter bar ===== */
  .filters {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    overflow-x: auto;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: nowrap;
  }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 50px;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    flex: 1;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 9px;
    border: 1px solid var(--border);
    border-radius: 11px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    user-select: none;
    transition: all 0.12s ease;
    line-height: 1.4;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--primary-mid); color: var(--primary); }
  .chip.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
    font-weight: 500;
  }
  .chip.heat-hot.active     { background: var(--hot-bar);   border-color: var(--hot-bar); }
  .chip.heat-trend.active   { background: var(--trend-bar); border-color: var(--trend-bar); }
  .chip.heat-new.active     { background: var(--new-bar);   border-color: var(--new-bar); color: #fff; }
  .chip.heat-arch.active    { background: var(--arch-bar);  border-color: var(--arch-bar); }
  .chip .badge {
    font-size: 9px;
    background: var(--surface-2);
    color: var(--text-mute);
    padding: 0 4px;
    border-radius: 6px;
    margin-left: 2px;
  }
  .chip.active .badge { background: rgba(255,255,255,0.22); color: #fff; }

  .date-custom {
    display: none;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    margin-left: 58px;
    flex-wrap: wrap;
  }
  .date-custom.show { display: flex; }
  .date-custom label { font-size: 11px; color: var(--text-dim); }
  .date-custom input[type="date"] {
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 11px;
    color: var(--text);
    font-family: inherit;
    background: var(--surface);
  }
  .date-custom input[type="date"]:focus { outline: none; border-color: var(--primary-mid); }

  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }
  .search-input {
    width: 100%;
    padding: 6px 30px 6px 28px;
    border: 1px solid var(--border);
    border-radius: 11px;
    background: var(--surface-2);
    font-size: 12px;
    color: var(--text);
    font-family: inherit;
  }
  .search-input:focus { outline: none; border-color: var(--primary-mid); background: #fff; }
  .search-icon {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-mute);
    font-size: 12px;
    pointer-events: none;
  }
  .clear-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-mute);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .clear-btn:hover { background: var(--surface-2); color: var(--text); }

  /* ===== Cards grid (high info density) — v2 4 大类分区版 ===== */
  .grid { display: block; }
  .cat-section {
    margin-bottom: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: linear-gradient(to right, color-mix(in srgb, var(--cat-color) 10%, white 90%), transparent 70%);
    border-bottom: 1px solid color-mix(in srgb, var(--cat-color) 30%, var(--border) 70%);
  }
  .cat-bar {
    display: inline-block;
    width: 6px;
    height: 22px;
    background: var(--cat-color);
    border-radius: 3px;
    flex-shrink: 0;
  }
  .cat-title { font-size: 15px; font-weight: 700; margin: 0; }
  .cat-zh { color: var(--text); }
  .cat-en { color: var(--text-dim); font-weight: 500; font-size: 13px; }
  .cat-counts { margin-left: auto; display: flex; gap: 6px; font-size: 11px; }
  .cat-total { background: #f1f5f9; color: var(--text-dim); padding: 2px 8px; border-radius: 8px; font-weight: 600; }
  .cat-hot   { background: #fef2f2; color: #b91c1c; padding: 2px 6px; border-radius: 8px; font-weight: 600; }
  .cat-trend { background: #fff7ed; color: #c2410c; padding: 2px 6px; border-radius: 8px; font-weight: 600; }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 12px;
  }
  @media (max-width: 1100px) { .cat-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px)  { .cat-grid { grid-template-columns: 1fr; } }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px 12px 16px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 5px;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
  }
  /* left 4px CAT color bar — 整类一种色 (不再用 heat 色) */
  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--cat-other);
  }
  /* Cat 配色: 整类一种色 (banner + 卡片色条 + 卡片 tint 都用 cat-color) */
  .card.cat-beauty::before   { background: var(--cat-beauty); }
  .card.cat-ai::before       { background: var(--cat-ai); }
  .card.cat-biz::before      { background: var(--cat-biz); }
  .card.cat-ec::before       { background: var(--cat-ec); }
  .card.cat-research::before { background: var(--cat-rsrch); }
  .card.cat-other::before    { background: var(--cat-other); }
  /* 卡片背景: cat 浅色 tint (整类一种色调, 不再用 heat 染色) */
  .cat-section.cat-beauty .card   { background: color-mix(in srgb, var(--cat-beauty) 5%, white); border-color: color-mix(in srgb, var(--cat-beauty) 18%, var(--border)); }
  .cat-section.cat-ai .card       { background: color-mix(in srgb, var(--cat-ai) 5%, white);     border-color: color-mix(in srgb, var(--cat-ai) 18%, var(--border)); }
  .cat-section.cat-biz .card      { background: color-mix(in srgb, var(--cat-biz) 5%, white);    border-color: color-mix(in srgb, var(--cat-biz) 18%, var(--border)); }
  .cat-section.cat-ec .card       { background: color-mix(in srgb, var(--cat-ec) 5%, white);     border-color: color-mix(in srgb, var(--cat-ec) 18%, var(--border)); }
  .cat-section.cat-research .card { background: color-mix(in srgb, var(--cat-rsrch) 5%, white);  border-color: color-mix(in srgb, var(--cat-rsrch) 18%, var(--border)); }

  .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-mute);
  }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .tag {
    display: inline-block;
    padding: 1px 6px;
    background: var(--surface);
    color: var(--text-dim);
    border-radius: 7px;
    font-size: 10px;
    font-weight: 500;
    border: 1px solid var(--border);
  }
  .tag.cat { background: var(--primary-soft); color: var(--primary); border-color: transparent; }
  .tag.market { background: #fff; color: var(--text-dim); }
  .tag.date { background: transparent; border: none; color: var(--text-mute); padding: 1px 0; }

  .heat-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 7px;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    background: #fff;
    border: 1px solid currentColor;
  }
  .heat-badge.hot   { color: var(--hot-bar); }
  .heat-badge.trend { color: var(--trend-bar); }
  .heat-badge.new   { color: var(--new-bar); }
  .heat-badge.arch  { color: var(--arch-bar); }

  .title-zh {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .title-en {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .desc-zh {
    font-size: 12px;
    color: var(--text);
    line-height: 1.45;
    margin-top: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    cursor: help;
    border-top: 1px dashed var(--border);
    padding-top: 6px;
  }

  /* 全文章精华 (D 方案: 从 meta description / og / 段提取) */
  .desc-full {
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.5;
    margin-top: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    cursor: help;
    border-top: 1px dashed var(--border);
    padding-top: 7px;
    font-weight: 400;
  }
  .desc-en {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.45;
    font-style: italic;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .sources-line {
    font-size: 10px;
    color: var(--primary);
    border-top: 1px dashed var(--border);
    padding-top: 5px;
    margin-top: 3px;
    line-height: 1.3;
  }
  .sources-line .lbl { color: var(--text-mute); font-weight: 600; }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 50px 20px;
    color: var(--text-mute);
    font-size: 13px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  /* ===== Loading ===== */
  .loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-mute);
    font-size: 13px;
  }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--primary-soft);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Mobile tweaks ===== */
  @media (max-width: 640px) {
    body { padding: 10px; }
    .header { margin: -10px -10px 10px; padding: 12px 14px 0; }
    .header h1 { font-size: 16px; }
    .date-custom { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<header class="header">
  <div class="header-top">
    <div>
      <h1>🌐 <span class="en">Global Trends Dashboard</span> · 全球趋势仪表盘</h1>
      <div class="header-sub" id="headerSub">加载中 / Loading…</div>
    </div>
    <div class="header-meta"><span class="live-dot"></span><span id="metaInfo">—</span></div>
  </div>
  <div class="stats" id="statsBar"></div>
</header>

<!-- ===== Filters ===== -->
<section class="filters">
  <div class="filter-row">
    <div class="filter-label">日期 Date</div>
    <div class="chips" id="dateChips">
      <span class="chip active" data-date="all">全部 All</span>
      <span class="chip" data-date="today">今天 Today</span>
      <span class="chip" data-date="3d">3 天 3d</span>
      <span class="chip" data-date="7d">7 天 7d</span>
      <span class="chip" data-date="14d">14 天 14d</span>
      <span class="chip" data-date="custom">自定义 Custom</span>
    </div>
  </div>
  <div class="date-custom" id="dateCustom">
    <label>起 From <input type="date" id="dateFrom" /></label>
    <label>止 To <input type="date" id="dateTo" /></label>
  </div>

  <div class="filter-row">
    <div class="filter-label">市场 Mkt</div>
    <div class="chips" id="marketChips"></div>
  </div>

  <div class="filter-row">
    <div class="filter-label">分类 Cat</div>
    <div class="chips" id="catChips"></div>
  </div>

  <div class="filter-row">
    <div class="filter-label">热度 Heat</div>
    <div class="chips" id="heatChips">
      <span class="chip active" data-heat="all">全部 All</span>
      <span class="chip heat-hot" data-heat="hot">🔥 HOT</span>
      <span class="chip heat-trend" data-heat="trend">🟧 TRENDING</span>
      <span class="chip heat-new" data-heat="new">🟨 NEW</span>
      <span class="chip heat-arch" data-heat="arch">⬜ ARCHIVED</span>
    </div>
  </div>

  <div class="filter-row">
    <div class="filter-label">搜索 Find</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="搜索中英文标题/描述 / Search title & desc (zh / en)…" />
      <button class="clear-btn" id="searchClear" title="清空 Clear" style="display:none">×</button>
    </div>
  </div>
</section>

<!-- ===== Cards grid ===== -->
<main class="grid" id="grid">
  <div class="loading"><span class="spinner"></span>加载数据中 / Loading data…</div>
</main>

<script>
  // ===== State =====
  const state = {
    stories: [],
    filtered: [],
    filters: {
      date: 'all',          // all | today | 3d | 7d | 14d | custom
      dateFrom: '',
      dateTo: '',
      markets: new Set(),   // empty = all
      cats: new Set(),      // empty = all
      heat: 'all',
      search: ''
    }
  };

  // ===== Labels =====
  const MARKET_LABELS = {
    us: 'US', cn: 'CN', kr: 'KR', jp: 'JP',
    eu: 'EU', ae: 'MENA', sea: 'SEA', global: 'Global'
  };
  const MARKET_ORDER = ['us', 'cn', 'kr', 'jp', 'eu', 'ae', 'sea', 'global'];
  const CAT_LABELS = {
    beauty: 'beauty', ai: 'ai', biz: 'biz', ec: 'ec', research: 'research'
  };
  const CAT_ORDER = ['beauty', 'ai', 'biz', 'ec', 'research'];
  const HEAT_LABELS = {
    hot: 'HOT', trend: 'TRENDING', new: 'NEW', arch: 'ARCHIVED'
  };
  const HEAT_EMOJI = {
    hot: '🔥', trend: '🟧', new: '🟨', arch: '⬜'
  };

  // ===== Helpers =====
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function todayISO() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function isoDaysAgo(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function fmtDate(iso) {
    if (!iso) return '';
    return iso.slice(0, 10);
  }

  // ===== Build chips with live counts =====
  function buildMarketChips() {
    const counts = {};
    state.stories.forEach(s => { counts[s.market] = (counts[s.market] || 0) + 1; });
    const container = document.getElementById('marketChips');
    container.innerHTML = MARKET_ORDER.map(m => {
      const c = counts[m] || 0;
      const active = state.filters.markets.has(m) ? 'active' : '';
      return `<span class="chip ${active}" data-market="${m}">${escapeHtml(MARKET_LABELS[m])}<span class="badge">${c}</span></span>`;
    }).join('');
  }

  function buildCatChips() {
    const counts = {};
    state.stories.forEach(s => { counts[s.cat] = (counts[s.cat] || 0) + 1; });
    const container = document.getElementById('catChips');
    container.innerHTML = CAT_ORDER.map(c => {
      const n = counts[c] || 0;
      return `<span class="chip" data-cat="${c}">${escapeHtml(CAT_LABELS[c])}<span class="badge">${n}</span></span>`;
    }).join('');
  }

  // ===== Filter =====
  function applyFilters() {
    const f = state.filters;
    const today = todayISO();
    const d3  = isoDaysAgo(2);   // last 3 days inclusive of today
    const d7  = isoDaysAgo(6);
    const d14 = isoDaysAgo(13);

    const fromCustom = f.dateFrom || null;
    const toCustom   = f.dateTo   || null;

    const q = f.search.trim().toLowerCase();

    state.filtered = state.stories.filter(s => {
      // Date
      if (f.date === 'today' && s.date !== today) return false;
      if (f.date === '3d'  && s.date < d3)  return false;
      if (f.date === '7d'  && s.date < d7)  return false;
      if (f.date === '14d' && s.date < d14) return false;
      if (f.date === 'custom') {
        if (fromCustom && s.date < fromCustom) return false;
        if (toCustom   && s.date > toCustom)   return false;
      }
      // Market (multi)
      if (f.markets.size > 0 && !f.markets.has(s.market)) return false;
      // Cat (multi)
      if (f.cats.size > 0 && !f.cats.has(s.cat)) return false;
      // Heat (single)
      if (f.heat !== 'all' && s.heat !== f.heat) return false;
      // Search
      if (q) {
        const hay = [
          s.title_zh || '', s.title_en || '',
          s.desc_zh  || '', s.desc_en  || ''
        ].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    // Sort: date desc, then heat priority
    const heatRank = { hot: 0, trend: 1, new: 2, arch: 3 };
    state.filtered.sort((a, b) => {
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (heatRank[a.heat] ?? 9) - (heatRank[b.heat] ?? 9);
    });

    render();
  }

  // ===== Render =====
  function render() {
    // Stats
    const total    = state.stories.length;
    const hotCnt   = state.stories.filter(s => s.heat === 'hot').length;
    const trendCnt = state.stories.filter(s => s.heat === 'trend').length;
    const newCnt   = state.stories.filter(s => s.heat === 'new').length;
    const archCnt  = state.stories.filter(s => s.heat === 'arch').length;
    const visCnt   = state.filtered.length;

    document.getElementById('statsBar').innerHTML = `
      <span class="stats-item total">📊 TOTAL <b>${total}</b></span>
      <span class="stats-item hot">🔥 HOT <b>${hotCnt}</b></span>
      <span class="stats-item trend">🟧 TRENDING <b>${trendCnt}</b></span>
      <span class="stats-item new">🟨 NEW <b>${newCnt}</b></span>
      <span class="stats-item arch">⬜ ARCHIVED <b>${archCnt}</b></span>
      <span class="stats-item visible">显示中 Showing <b>${visCnt}</b></span>
    `;

    // Grid — v2 风格: 按 4 大类分区, 每类顶部带 Cat 颜色装饰条
    const grid = document.getElementById('grid');
    if (state.filtered.length === 0) {
      grid.innerHTML = '<div class="empty">无匹配结果 / No matching stories. 试试调整筛选条件 / Try adjusting filters.</div>';
      return;
    }

    // 按 cat 分组, 按 CAT_ORDER 顺序
    const groups = new Map();
    state.filtered.forEach(s => {
      const c = s.cat || 'other';
      if (!groups.has(c)) groups.set(c, []);
      groups.get(c).push(s);
    });
    const orderedCats = CAT_ORDER.filter(c => groups.has(c));
    for (const [c, arr] of groups) { if (!orderedCats.includes(c)) orderedCats.push(c); }

    const catColorVar = {
      beauty: 'var(--cat-beauty)',
      ai:     'var(--cat-ai)',
      biz:    'var(--cat-biz)',
      ec:     'var(--cat-ec)',
      research: 'var(--cat-rsrch)',
      other:  'var(--cat-other)',
    };
    const catEnLabel = {
      beauty: 'Beauty & Skincare',
      ai:     'AI & Tech',
      biz:    'Business / VC / IPO',
      ec:     'E-Commerce / DTC',
      research: 'Research / Think Tank',
      other:  'Other',
    };

    grid.innerHTML = orderedCats.map(cat => {
      const stories = groups.get(cat);
      const color = catColorVar[cat] || 'var(--cat-other)';
      const enLabel = catEnLabel[cat] || cat;
      const zhLabel = CAT_LABELS[cat] || cat;
      const hotInCat = stories.filter(s => s.heat === 'hot').length;
      const trendInCat = stories.filter(s => s.heat === 'trend').length;

      const cards = stories.map(s => {
        const sources = (s.sources && s.sources.length > 1)
          ? `<div class="sources-line"><span class="lbl">Sources:</span> ${escapeHtml(s.sources.join(', '))}</div>`
          : '';
        // 全文章精华 (desc_full_zh / desc_full_en)
        const fullZh = (s.desc_full_zh || '').trim();
        const fullEn = (s.desc_full_en || '').trim();
        const fullSummary = fullZh || fullEn;
        const summaryHtml = fullSummary
          ? `<div class="desc-full" title="${escapeHtml(fullSummary).replace(/"/g,'&quot;')}">${escapeHtml(fullSummary.length > 220 ? fullSummary.slice(0, 220) + '…' : fullSummary)}</div>`
          : '';
        return `
        <a class="card cat-${cat} heat-${s.heat || 'arch'}" href="${(s.sourceLinks && s.sourceLinks[0]) ? s.sourceLinks[0] : (s.source || '#')}" target="_blank" rel="noopener noreferrer">
          <div class="card-top">
            <div class="card-tags">
              <span class="tag market">${escapeHtml(MARKET_LABELS[s.market] || s.market || '')}</span>
              <span class="tag date">${escapeHtml(fmtDate(s.date))}</span>
            </div>
            <span class="heat-badge ${s.heat || 'arch'}">${HEAT_EMOJI[s.heat] || ''} ${HEAT_LABELS[s.heat] || s.heat || ''}</span>
          </div>
          <div class="title-zh">${escapeHtml(s.title_zh || s.title_en || '')}</div>
          <div class="title-en">${escapeHtml(s.title_en || '')}</div>
          ${summaryHtml}
          ${sources}
        </a>`;
      }).join('');

      return `
        <section class="cat-section cat-${cat}" style="--cat-color:${color}">
          <header class="cat-header">
            <span class="cat-bar"></span>
            <h2 class="cat-title">
              <span class="cat-zh">${escapeHtml(zhLabel)}</span>
              <span class="cat-en">· ${escapeHtml(enLabel)}</span>
            </h2>
            <div class="cat-counts">
              <span class="cat-total">${stories.length} 条</span>
              ${hotInCat ? `<span class="cat-hot">🔥 ${hotInCat}</span>` : ''}
              ${trendInCat ? `<span class="cat-trend">🟧 ${trendInCat}</span>` : ''}
            </div>
          </header>
          <div class="cat-grid">${cards}</div>
        </section>`;
    }).join('');
  }

  // ===== Events =====
  function bindEvents() {
    // Date chips
    document.getElementById('dateChips').addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      document.querySelectorAll('#dateChips .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      const v = chip.dataset.date;
      state.filters.date = v;
      document.getElementById('dateCustom').classList.toggle('show', v === 'custom');
      if (v === 'custom') {
        const dates = state.stories.map(s => s.date).filter(Boolean).sort();
        if (dates.length) {
          const min = dates[0], max = dates[dates.length - 1];
          if (!state.filters.dateFrom) {
            document.getElementById('dateFrom').value = min;
            state.filters.dateFrom = min;
          }
          if (!state.filters.dateTo) {
            document.getElementById('dateTo').value = max;
            state.filters.dateTo = max;
          }
        }
      }
      applyFilters();
    });

    document.getElementById('dateFrom').addEventListener('change', e => {
      state.filters.dateFrom = e.target.value;
      applyFilters();
    });
    document.getElementById('dateTo').addEventListener('change', e => {
      state.filters.dateTo = e.target.value;
      applyFilters();
    });

    // Market chips (multi-select)
    document.getElementById('marketChips').addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      const m = chip.dataset.market;
      if (state.filters.markets.has(m)) {
        state.filters.markets.delete(m);
        chip.classList.remove('active');
      } else {
        state.filters.markets.add(m);
        chip.classList.add('active');
      }
      applyFilters();
    });

    // Cat chips (multi-select)
    document.getElementById('catChips').addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      const c = chip.dataset.cat;
      if (state.filters.cats.has(c)) {
        state.filters.cats.delete(c);
        chip.classList.remove('active');
      } else {
        state.filters.cats.add(c);
        chip.classList.add('active');
      }
      applyFilters();
    });

    // Heat chips (single-select)
    document.getElementById('heatChips').addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      document.querySelectorAll('#heatChips .chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.filters.heat = chip.dataset.heat;
      applyFilters();
    });

    // Search (debounced)
    const si = document.getElementById('searchInput');
    const sc = document.getElementById('searchClear');
    let timer;
    si.addEventListener('input', e => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        state.filters.search = e.target.value;
        sc.style.display = e.target.value ? 'block' : 'none';
        applyFilters();
      }, 120);
    });
    sc.addEventListener('click', () => {
      si.value = '';
      state.filters.search = '';
      sc.style.display = 'none';
      applyFilters();
      si.focus();
    });

    // Keyboard: "/" focuses search
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement.id !== 'searchInput') {
        e.preventDefault();
        si.focus();
        si.select();
      }
      if (e.key === 'Escape' && document.activeElement === si) {
        si.blur();
      }
    });
  }

  // ===== Boot =====
  async function boot() {
    try {
      const res = await fetch('./trends-data.json?v=7');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      state.stories = data.stories || [];

      // Header subtitle
      const sub = document.getElementById('headerSub');
      const windowTxt = data.window || '—';
      sub.textContent = `今日 ${data.new_today || state.stories.length} 条 · 🔥 HOT ${data.stats?.hot || 0} · 🟧 TRENDING ${data.stats?.trend || 0} · 窗口 ${windowTxt}`;

      const meta = document.getElementById('metaInfo');
      meta.textContent = `更新 ${(data.last_updated || '—').slice(0, 16).replace('T', ' ')} · ${data.sources_ok || 0}/${(data.sources_ok || 0) + (data.sources_failed || 0)} sources`;

      buildMarketChips();
      buildCatChips();
      bindEvents();
      applyFilters();
    } catch (err) {
      document.getElementById('grid').innerHTML =
        `<div class="empty">加载失败 / Failed to load data: ${escapeHtml(err.message)}<br/><br/>如果直接打开 file:// 协议可能被浏览器拦截,建议用本地 server (例如 <code>python3 -m http.server</code>) / Browser may block file:// fetch — use a local server.</div>`;
      console.error(err);
    }
  }

  boot();
</script>
